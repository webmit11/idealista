<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ app_name }}</title>
  <link rel="icon" href="/static/favicon.png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f1115);
      --sec: var(--tg-theme-secondary-bg-color, #1a1d24);
      --text: var(--tg-theme-text-color, #e6e9ef);
      --hint: var(--tg-theme-hint-color, #8a93a2);
      --link: var(--tg-theme-link-color, #4f8cff);
      --btn: var(--tg-theme-button-color, #4f8cff);
      --btn-text: var(--tg-theme-button-text-color, #fff);
      --line: #2a2f3a;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text);
           font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .topbar { position: sticky; top: 0; background: var(--bg); z-index: 5; }
    .tabs { display: flex; gap: 9px; padding: 10px 10px 4px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .cat { position: relative; flex: 0 0 auto; width: 82px; height: 82px; border: none; padding: 0;
           border-radius: 16px; background: #15171c center/cover no-repeat; overflow: hidden; cursor: pointer; }
    .cat span { position: absolute; left: 0; right: 0; bottom: 0; padding: 12px 7px 7px; font-size: 11px;
                font-weight: 600; color: #fff; text-align: left; background: linear-gradient(transparent, rgba(0,0,0,.78)); }
    .cat.active { outline: 2px solid var(--btn); outline-offset: -2px; box-shadow: 0 0 0 4px rgba(79,140,255,.18); }
    .bar { display: flex; align-items: center; justify-content: space-between; padding: 0 12px 6px; }
    .meta { color: var(--hint); font-size: 12px; }
    .ghost { background: var(--btn); color: var(--btn-text); border: none; border-radius: 9px; padding: 7px 13px; font-size: 13px; font-weight: 500; }
    .card { display: flex; gap: 10px; background: var(--sec); border-radius: 12px; margin: 8px 10px; padding: 10px; }
    .card img { width: 96px; height: 72px; object-fit: cover; border-radius: 8px; background: #11141a; flex: none; }
    .card .body { min-width: 0; flex: 1; }
    .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .score { font-weight: 700; padding: 1px 8px; border-radius: 20px; color: #07140c; font-size: 13px; }
    .title { font-size: 13px; margin: 3px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .facts { color: var(--hint); font-size: 12px; }
    .price { font-weight: 600; }
    .badge { font-size: 11px; padding: 1px 7px; border-radius: 12px; color: #fff; }
    a { color: var(--link); text-decoration: none; }
    .empty { text-align: center; color: var(--hint); padding: 40px 16px; }
    .more { display: block; width: calc(100% - 20px); margin: 8px 10px 24px; padding: 12px; border: none;
            border-radius: 10px; background: var(--sec); color: var(--text); font-size: 14px; }
    /* sheet / detail overlays */
    .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 20; overflow-y: auto; display: none; }
    .overlay.open { display: block; }
    .ohead { display: flex; align-items: center; gap: 10px; padding: 12px; position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--line); }
    .ohead b { flex: 1; font-size: 16px; }
    .x { background: var(--sec); border: none; color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 14px; }
    .pad { padding: 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 9px 10px; border-radius: 9px; border: 1px solid var(--line); background: #11141a; color: var(--text); font-size: 15px; }
    .toggles { display: flex; flex-wrap: wrap; gap: 8px; }
    .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; background: var(--sec); padding: 8px 10px; border-radius: 9px; }
    .apply { width: 100%; padding: 13px; border: none; border-radius: 11px; background: var(--btn); color: var(--btn-text); font-size: 15px; font-weight: 600; margin-top: 6px; }
    .reset { width: 100%; padding: 11px; border: none; border-radius: 11px; background: var(--sec); color: var(--text); font-size: 14px; margin-top: 8px; }
    .gal { display: grid; grid-auto-flow: column; grid-auto-columns: 78%; gap: 8px; overflow-x: auto; padding: 0 12px 6px; scroll-snap-type: x mandatory; }
    .gal img { width: 100%; height: 190px; object-fit: cover; border-radius: 12px; scroll-snap-align: start; background: #11141a; }
    .kv { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; font-size: 13px; }
    .kv .k { color: var(--hint); }
    .panel { background: var(--sec); border-radius: 12px; padding: 12px; margin: 10px 0; }
    .panel h3 { font-size: 14px; margin: 0 0 8px; }
    .line { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid var(--line); }
    .line:last-child { border-bottom: none; }
    .flag { display: inline-block; background: #3a2326; color: #ffb4ac; border-radius: 7px; padding: 1px 7px; margin: 2px 3px 0 0; font-size: 12px; }
    .bonus { display: inline-block; background: #16321f; color: #8fe3ab; border-radius: 7px; padding: 1px 7px; margin: 2px 3px 0 0; font-size: 12px; }
    .wbtns { display: flex; flex-wrap: wrap; gap: 7px; }
    .wbtn { border: 1px solid var(--line); background: #11141a; color: var(--text); border-radius: 9px; padding: 8px 11px; font-size: 13px; }
    .wbtn.on { color: #07140c; font-weight: 700; border-color: transparent; }
    .chips { display: flex; gap: 7px; overflow-x: auto; padding: 0 10px 8px; }
    .chip { white-space: nowrap; border: 1px solid var(--line); background: var(--sec); color: var(--text); border-radius: 16px; padding: 6px 12px; font-size: 13px; }
    .chip.on { background: var(--btn); color: var(--btn-text); border-color: transparent; }
    .open-btn { display: block; text-align: center; background: var(--btn); color: var(--btn-text); border-radius: 11px; padding: 13px; font-size: 15px; font-weight: 600; margin: 14px 0 24px; }
    .heart { background: none; border: none; font-size: 27px; line-height: 1; color: #e5534b; cursor: pointer; padding: 0 2px; flex: none; }
    .heart.off { color: #454a55; }
    /* ROI simulator */
    .sim-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 4px 0 12px; }
    .sim-kpi { background: rgba(255,255,255,.05); border-radius: 11px; padding: 9px 11px; }
    .sim-kpi .k { font-size: 11px; color: var(--hint); }
    .sim-kpi .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .sim-kpi.hero { grid-column: 1 / 3; background: linear-gradient(135deg, #15311f, #0f2433); }
    .sim-kpi.hero .v { font-size: 24px; }
    .sim-row { margin: 11px 0; }
    .sim-row .lab { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
    .sim-row .lab b { color: var(--text); }
    .sim-row input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 5px; border-radius: 4px;
            background: var(--line); outline: none; }
    .sim-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
            background: var(--btn); border: 3px solid var(--bg); box-shadow: 0 0 0 1px var(--btn); cursor: pointer; }
    .sim-row input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--btn); border: 3px solid var(--bg); cursor: pointer; }
    .sim-chart { width: 100%; height: 150px; display: block; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="topbar" id="topbar">
    <div class="tabs" id="tabs"></div>
    <div class="bar">
      <span class="meta" id="meta">Загрузка…</span>
      <span style="display:flex; gap:8px;">
        <button class="ghost" id="areasBtn" style="background:var(--sec); color:var(--text);">🗺 Районы</button>
        <button class="ghost" id="filterBtn">⚙ Фильтры</button>
      </span>
    </div>
  </div>
  <div id="trialBanner"></div>
  <div id="chips"></div>
  <div id="stats"></div>
  <div id="list"></div>
  <button class="more" id="more" style="display:none">Показать ещё</button>

  <!-- Areas sheet -->
  <div class="overlay" id="areasSheet">
    <div class="ohead"><b>Где покупать — районы</b><button class="x" id="areasClose">Закрыть</button></div>
    <div class="pad"><div class="meta" style="margin-bottom:10px;">Балл = медиана инвест-баллов объектов зоны. Тап — объекты района.</div><div id="areasList"></div></div>
  </div>

  <!-- Filter sheet -->
  <div class="overlay" id="filterSheet">
    <div class="ohead"><b>Фильтры</b><button class="x" id="filterClose">Закрыть</button></div>
    <div class="pad">
      <div class="field"><label>Сортировка</label><select id="f_sort">
        <option value="score_desc">Балл ↓</option>
        <option value="price_asc">Цена ↑</option>
        <option value="price_desc">Цена ↓</option>
        <option value="ppm2_asc">€/m² ↑</option>
        <option value="yield_desc">Доходность ↓</option>
        <option value="distance_asc">Ближе к метро</option>
        <option value="area_desc">Площадь ↓</option>
        <option value="newest">Новые</option>
        <option value="biggest_drop">Снижения</option>
      </select></div>
      <div class="field"><label>Min score</label><input type="number" id="f_min_score" inputmode="numeric" placeholder="напр. 60"></div>
      <div class="field"><label>Макс. цена €</label><input type="number" id="f_max_price" inputmode="numeric" placeholder="напр. 250000"></div>
      <div class="field"><label>Типология</label><select id="f_typology"><option value="">Любая</option></select></div>
      <div class="field"><label>Concelho</label><select id="f_municipality"><option value="">Любой</option></select></div>
      <div class="field"><label>До метро ≤ м</label><input type="number" id="f_max_dist" inputmode="numeric" placeholder="напр. 800"></div>
      <div class="field"><label>Доходность ≥ %</label><input type="number" id="f_min_yield" inputmode="decimal" placeholder="напр. 6"></div>
      <div class="toggles" id="toggles"></div>
      <button class="apply" id="filterApply">Применить</button>
      <button class="reset" id="filterReset">Сбросить</button>
      <div style="margin-top:16px; border-top:1px solid rgba(255,255,255,.08); padding-top:14px;">
        <button class="apply" id="filterSave" style="background:#1d3a2a; color:#9fe3b8;">🔔 Сохранить как подписку</button>
        <div id="savedList" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <!-- Detail -->
  <div class="overlay" id="detail">
    <div class="ohead"><button class="x" id="detailClose">‹ Назад</button><b id="detailTitle"></b></div>
    <div id="detailBody"></div>
  </div>

  <!-- Paywall -->
  <div class="overlay" id="paywall">
    <div class="pad" style="text-align:center; padding-top:48px;">
      <img src="/static/logo.png" alt="Domus" style="width:84px; height:84px; border-radius:20px;">
      <h2 style="margin:14px 0 2px;">Domus</h2>
      <div class="meta" style="font-size:13px; margin-bottom:20px;">дом, который приносит доход</div>
      <h3 style="margin:10px 0 4px;">Доступ по подписке</h3>
      <p class="meta" id="paywallText" style="font-size:14px;"></p>
      <button class="apply" id="subscribeBtn" style="max-width:320px; margin:18px auto 0;">Подписаться</button>
      <p class="meta" id="paywallStatus" style="margin-top:14px;"></p>
    </div>
  </div>

  <script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();
  const $ = id => document.getElementById(id);
  const fmt = n => n == null ? '—' : Math.round(n).toLocaleString('pt-PT');
  const f1 = n => n == null ? '—' : n.toFixed(1);
  const eur = n => n == null ? '—' : fmt(n) + ' €';
  const scoreColor = s => s == null ? '#444' : s >= 70 ? '#2fbf71' : s >= 55 ? '#9acd32' : s >= 40 ? '#f5a623' : '#e5534b';

  const TABS = [
    { id: 'top',  label: 'Топ',         icon: 'top',   base: { sort: 'score_desc', min_score: 60 } },
    { id: 'new',  label: 'Новинки',     icon: 'new',   base: { only_new: 'true', sort: 'newest' } },
    { id: 'drop', label: 'Снижения',    icon: 'drop',  base: { only_price_drops: 'true', sort: 'biggest_drop' } },
    { id: 'dev',  label: 'Новостройки', icon: 'dev',   base: { only_developments: 'true', with_stats: '1', sort: 'score_desc' } },
    { id: 'al',   label: 'AL бизнес',   icon: 'al',    base: { has_al_license: 'true', sort: 'score_desc' } },
    { id: 'watch', label: 'Воронка',    icon: 'watch', base: { watched_only: 'true', sort: 'watch_desc' } },
  ];
  const TOGGLES = [
    ['only_new', 'Новинки'], ['only_price_drops', 'Снижения'], ['has_terrace', 'Терраса'],
    ['south_facing', 'Окна на юг'], ['has_garage', 'Гараж'], ['has_elevator', 'Лифт'],
    ['exclude_ground_floor', 'Без 1 этажа'], ['only_exact_location', 'Точный адрес'],
    ['expert_positive', '👍 Эксперт +'], ['has_al_license', '🏷 AL-лицензия'],
  ];

  let META = { municipalities: [], typologies: [], watch_statuses: [] };
  let ME = { active: false, owner: false };
  let wmap = {};
  let state = { tab: 'top', filters: {}, sort: null, offset: 0, limit: 50, total: 0, items: [], watchStatus: '' };

  function authHeaders() { return { 'X-Telegram-Init-Data': tg.initData }; }
  async function api(path) {
    const r = await fetch(path, { headers: authHeaders() });
    if (r.status === 401 || r.status === 403) throw new Error('forbidden');
    return r.json();
  }

  function buildParams(extra) {
    const tab = TABS.find(t => t.id === state.tab);
    const p = new URLSearchParams(Object.assign({}, tab.base, state.filters, extra || {}));
    if (state.sort) p.set('sort', state.sort);
    return p;
  }

  async function loadList(reset) {
    if (state.tab === 'watch') return loadWatchlist(reset);
    $('chips').innerHTML = '';
    if (reset) { state.offset = 0; state.items = []; }
    $('meta').textContent = 'Загрузка…';
    let data;
    try {
      data = await api('/app/api/properties?' + buildParams({ limit: state.limit, offset: state.offset }));
    } catch (e) {
      $('meta').textContent = '';
      $('list').innerHTML = '<div class="empty">Доступ закрыт.</div>';
      $('more').style.display = 'none'; $('stats').innerHTML = ''; return;
    }
    state.total = data.total;
    state.items = state.items.concat(data.rows);
    $('meta').textContent = state.total + ' объектов';
    renderStats(data.stats);
    renderList();
  }

  async function loadWatchlist(reset) {
    $('meta').textContent = 'Загрузка…'; $('stats').innerHTML = '';
    let data;
    try { data = await api('/app/api/watchlist' + (state.watchStatus ? '?status=' + state.watchStatus : '')); }
    catch (e) { $('meta').textContent = ''; $('list').innerHTML = '<div class="empty">Ошибка.</div>'; $('more').style.display = 'none'; return; }
    state.items = data.rows; state.total = data.total;
    $('meta').textContent = state.total + ' в воронке';
    renderWatchChips(data.counts, data.watch_statuses);
    if (!state.items.length) $('list').innerHTML = '<div class="empty">Воронка пуста. Открой объект и нажми статус сделки.</div>';
    else renderList();
    $('more').style.display = 'none';
  }

  function renderWatchChips(counts, statuses) {
    const total = Object.values(counts || {}).reduce((a, b) => a + b, 0);
    let html = `<button class="chip ${!state.watchStatus ? 'on' : ''}" onclick="setWatchFilter('')">Все ${total}</button>`;
    html += (statuses || []).filter(s => counts[s.value]).map(s =>
      `<button class="chip ${state.watchStatus === s.value ? 'on' : ''}" onclick="setWatchFilter('${s.value}')">${s.label} ${counts[s.value]}</button>`).join('');
    $('chips').innerHTML = html;
  }
  function setWatchFilter(v) { state.watchStatus = v; loadWatchlist(true); }

  function renderStats(stats) {
    if (!stats) { $('stats').innerHTML = ''; return; }
    $('stats').innerHTML = `<div class="panel" style="margin:0 10px 4px;"><div class="kv">
      <div><span class="k">Всего:</span> ${stats.count}</div>
      <div><span class="k">Ср. цена:</span> ${eur(stats.avg_price)}</div>
      <div><span class="k">Ср. €/m²:</span> ${fmt(stats.avg_ppm2)}</div>
      <div><span class="k">Ср. балл:</span> ${fmt(stats.avg_score)}</div></div></div>`;
  }

  function idealistaUrl(r) {
    if (r.url && r.url.indexOf('/empreendimento/') !== -1 && r.external_id)
      return 'https://www.idealista.pt/imovel/' + r.external_id + '/';
    return r.url;
  }

  function yColor(y) {
    if (y == null) return ['#222633', '#9aa3b2'];
    if (y >= 7)    return ['#12351f', '#7ee6a4'];
    if (y >= 5.5)  return ['#16321f', '#8fe3ab'];
    if (y >= 4)    return ['#3a3220', '#f5c97a'];
    return ['#3a2326', '#ffb4ac'];
  }

  function card(r) {
    const img = r.thumbnail_url ? `<img src="${r.thumbnail_url}" alt="">` : '<img alt="">';
    const isAL = r.has_al_license && r.al_gross_yield != null;
    const yv = isAL ? r.al_gross_yield : r.gross_yield_percent;
    const yld = yv != null ? f1(yv) + '%' : '—';
    const yc = yColor(yv);
    const dist = r.distance_to_metro_m != null ? fmt(r.distance_to_metro_m) + ' м' : '—';
    const walk = r.walking_minutes_to_metro_estimate != null ? ' · ' + r.walking_minutes_to_metro_estimate + ' мин' : '';
    const drop = r.price_drop_percent ? ` · 🔻${f1(r.price_drop_percent)}%` : '';
    const ws = r.watch_status && wmap[r.watch_status]
      ? ` <span class="badge" style="background:${wmap[r.watch_status].color}">${wmap[r.watch_status].label}</span>` : '';
    const al = r.has_al_license ? ` <span class="badge" style="background:#7a4ddb">🏷 AL</span>` : '';
    return `<div class="card" onclick="openDetail(${r.id})">${img}<div class="body">
      <div class="row1"><span class="score" style="background:${scoreColor(r.total_score)}">${r.total_score != null ? Math.round(r.total_score) : '—'}</span>
        <span class="price">${eur(r.price)}</span>
        <span style="margin-left:auto; background:${yc[0]}; color:${yc[1]}; font-size:13px; font-weight:600; padding:3px 11px; border-radius:20px; white-space:nowrap;">${isAL ? '🏷 AL ' : ''}доход. ${yld}</span></div>
      <div class="title">${r.title || 'Listing ' + r.id}${al}${ws}</div>
      <div class="facts">${r.typology || ''} · ${fmt(r.price_per_m2)} €/m² · ${r.municipality || ''}${r.parish ? ' / ' + r.parish : ''}<br>
        🚇 ${r.nearest_metro_station || '—'} · ${dist}${walk}${drop}</div>
    </div></div>`;
  }

  function renderList() {
    const list = $('list');
    if (!state.items.length) { list.innerHTML = '<div class="empty">Ничего не найдено.</div>'; $('more').style.display = 'none'; return; }
    list.innerHTML = state.items.map(card).join('');
    $('more').style.display = state.items.length < state.total ? 'block' : 'none';
  }

  // ---- detail ----
  async function openDetail(id) {
    chatLog = [];
    $('detail').classList.add('open');
    $('detailBody').innerHTML = '<div class="empty">Загрузка…</div>';
    tg.BackButton.show();
    let d;
    try { d = await api('/app/api/property/' + id); }
    catch (e) { $('detailBody').innerHTML = '<div class="empty">Ошибка.</div>'; return; }
    renderDetail(d);
  }
  function closeDetail() {
    $('detail').classList.remove('open'); tg.BackButton.hide();
    if (state.tab === 'watch') loadWatchlist(true);  // reflect status edits
  }

  function renderDetail(d) {
    const r = d.property, ex = d.explain, iv = d.invest;
    $('detailTitle').textContent = r.typology || 'Объект';
    const gal = (r.image_urls && r.image_urls.length)
      ? `<div class="gal">${r.image_urls.map(u => `<img src="${u}">`).join('')}</div>` : '';
    const yn = v => v ? 'да' : '—';
    const facts = `<div class="panel"><div class="kv">
      <div><span class="k">Цена:</span> <b>${eur(r.price)}</b></div>
      <div><span class="k">Площадь:</span> ${fmt(r.area_m2)} m²</div>
      <div><span class="k">Комнат:</span> ${r.rooms ?? '—'}</div>
      <div><span class="k">Этаж:</span> ${r.floor ?? '—'}</div>
      <div><span class="k">Лифт:</span> ${yn(r.has_elevator)}</div>
      <div><span class="k">Гараж:</span> ${yn(r.has_garage)}</div>
      <div><span class="k">Терраса:</span> ${yn(r.has_terrace)}</div>
      <div><span class="k">Состояние:</span> ${r.condition || '—'}</div>
      <div><span class="k">Энерго:</span> ${r.energy_certificate || '—'}</div>
      <div style="grid-column:1/3;"><span class="k">🚇</span> ${r.nearest_metro_station || '—'} · ${r.distance_to_metro_m != null ? fmt(r.distance_to_metro_m) + ' м' : '—'}${r.walking_minutes_to_metro_estimate != null ? ' · ~' + r.walking_minutes_to_metro_estimate + ' мин пешком' : ''}${r.exact_location ? '' : ' (приблизительно)'}</div>

    let inv = '';

        <div class="line"><span>NOI / год</span><span>${eur(inc.noi)}</span></div>
        <div class="line"><span>Чистая дох.</span><span>${f1(inc.net_yield)}%</span></div>
        <div class="line"><span>Ипотека ${m.ltv_pct}% @ ${m.rate_pct}%/${m.term_years}л</span><span>${eur(m.loan)}</span></div>
        <div class="line"><span>Платёж / мес</span><span>${eur(m.monthly_payment)}</span></div>
        <div class="line"><span>Кэшфлоу / мес</span><span>${eur(m.monthly_cashflow)}</span></div>
        <div class="line"><span>Cash-on-cash</span><span>${f1(m.cash_on_cash)}%</span></div></div>`;
    }

    let al = '';
    if (iv && iv.al && r.has_al_license) {
      const x = iv.al, a = iv.acquisition, m = iv.mortgage;
      al = `<div class="panel"><h3 style="display:flex; align-items:center;">Экономика — краткосрочная аренда (AL)<span style="margin-left:8px; font-size:12px; font-weight:600; padding:2px 9px; border-radius:12px; background:#2a1f47; color:#cbb4ff;">🏷 Airbnb</span></h3>
        <div class="line"><span>Выручка / мес (вал.)</span><span>${eur(x.monthly_gross)}</span></div>
        <div class="line"><span>Выручка / год (вал.)</span><span>${eur(x.annual_gross)}</span></div>
        <div class="line"><span>Валовая доходность</span><span>${f1(x.gross_yield)}%</span></div>
        <div class="line"><span>Чистая доходность (расходы ${x.opex_pct}%)</span><span>${f1(x.net_yield)}%</span></div>
        <div class="line"><span>NOI / год</span><span>${eur(x.noi)}</span></div>
        <div class="line"><span>Всего вход</span><span>${eur(a.total_investment)}</span></div>
        <div class="line"><span>Ипотека ${m.ltv_pct}% @ ${m.rate_pct}%/${m.term_years}л</span><span>${eur(m.loan)}</span></div>
        <div class="line"><span>Платёж / мес</span><span>${eur(m.monthly_payment)}</span></div>
        <div class="line"><span>Кэшфлоу / мес</span><span>${eur(x.monthly_cashflow)}</span></div>
        <div class="line"><span>Cash-on-cash</span><span>${f1(x.cash_on_cash)}%</span></div>
        <div class="meta" style="margin-top:6px;">Оценка ~${x.multiplier}× к долгосрочной аренде. Реальный доход зависит от ставки и загрузки — модель, не гарантия.</div></div>`;
    }

    let alAdmin = '';
    if (ME.owner && (r.has_al_license || r.al_override != null)) {
      const rm = r.has_al_license ? `<button class="reset" onclick="setAl(${r.id},'not_al')">✗ Убрать из AL</button>` : '';
      const auto = r.al_override != null ? ` <button class="reset" onclick="setAl(${r.id},'auto')">↺ Вернуть авто</button>` : '';
      alAdmin = `<div class="panel"><div class="meta" style="margin-bottom:6px;">Админ · AL-категория</div>${rm}${auto}</div>`;
    }

    const chat = `<div class="panel"><h3>💬 Спросить про объект</h3>
      <div id="chatBox" style="display:flex; flex-direction:column; gap:8px; margin-bottom:8px;"></div>
      <div id="chatChips" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;"></div>
      <div style="display:flex; gap:6px;"><input id="chatInput" placeholder="Ваш вопрос об этом объекте…" style="flex:1; padding:9px 11px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:#e6e8ee; font-size:14px;"><button class="reset" style="width:auto; padding:0 16px;" onclick="sendChat(${r.id})">→</button></div></div>`;

    const sim = simHtml(iv, r);

    const cur = r.watch_status || '';
    state._cur = cur;
    const wbtns = d.watch_statuses.map(s =>
      `<button class="wbtn ${s.value === cur ? 'on' : ''}" style="${s.value === cur ? 'background:' + s.color : ''}" onclick="setWatch(${r.id},'${s.value}')">${s.label}</button>`).join('');
    const watch = `<div class="panel"><h3>Моя воронка сделки</h3>
      <div class="wbtns">${wbtns}<button class="wbtn ${!cur ? 'on' : ''}" onclick="setWatch(${r.id},'')">— нет —</button></div>
      <div class="field" style="margin-top:10px;"><label>Заметка</label><input id="wnote" value="${(r.watch_note || '').replace(/"/g, '&quot;')}" placeholder="телефон агента, торг…"></div>
      <button class="reset" onclick="saveNote(${r.id})">Сохранить заметку</button></div>`;

    let ppm = '';
    if (r.median_ppm2) {
      const diff = r.ppm2_diff_pct;
      let bg = '#222633', tc = '#c7cad3', word = 'на уровне рынка';
      if (diff != null && diff < 0) { bg = '#16321f'; tc = '#8fe3ab'; word = 'ниже рынка'; }
      else if (diff != null && diff > 0) { bg = '#3a2326'; tc = '#ffb4ac'; word = 'выше рынка'; }
      ppm = `<div class="panel" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <div><div style="font-size:24px; font-weight:700;">${fmt(r.price_per_m2)} €/m²</div>
             <div class="meta" style="margin:2px 0 0;">медиана района ${fmt(r.median_ppm2)} €/m²</div></div>
        ${diff != null ? `<div style="text-align:center; background:${bg}; color:${tc}; padding:8px 14px; border-radius:13px;"><div style="font-size:19px; font-weight:700;">${diff > 0 ? '+' : '−'}${f1(Math.abs(diff))}%</div><div style="font-size:11px;">${word}</div></div>` : ''}
      </div>`;
    }
    const url = idealistaUrl(r);
    const open = url ? `<a class="open-btn" href="#" onclick="tg.openLink('${url}');return false;">Открыть на Idealista →</a>` : '';
    let expert = '';
    if (d.expert_text) {
      const safe = d.expert_text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');

      const badge = (dl != null && dl !== 0)
        ? `<span style="margin-left:8px; font-size:12px; font-weight:600; padding:2px 9px; border-radius:12px; background:${dl > 0 ? '#16321f' : '#3a2326'}; color:${dl > 0 ? '#8fe3ab' : '#ffb4ac'};">${dl > 0 ? '+' : ''}${dl} к баллу</span>`
        : '';
      expert = `<div class="panel"><h3 style="display:flex; align-items:center;">Экспертная оценка${badge}</h3><div style="font-size:14px; line-height:1.55;">${safe}</div></div>`;
    } else if (d.expert) {
      const e = d.expert;
      const pros = (e.pros || []).map(x => `<div style="font-size:13px; padding:2px 0;"><span style="color:#8fe3ab;">✓</span> ${x}</div>`).join('');
      const cons = (e.cons || []).map(x => `<div style="font-size:13px; padding:2px 0;"><span style="color:#ffb4ac;">!</span> ${x}</div>`).join('');

        <div style="font-weight:600; font-size:15px; margin-bottom:8px;">${e.verdict}</div>
        ${pros}${cons}
        <div class="meta" style="margin-top:8px;">${e.audience}</div></div>`;
    }
    const heart = `<button class="heart ${cur === 'interested' ? '' : 'off'}" onclick="toggleHeart(${r.id})" aria-label="В воронку">♥</button>`;
    const mapHtml = (r.latitude != null && r.longitude != null)
      ? `<div class="panel" style="padding:0; overflow:hidden;"><div id="omap" style="height:190px; background:#2a2f3a;"></div>${r.exact_location ? '' : '<div class="meta" style="padding:8px 12px;">Приблизительная зона — точный адрес скрыт</div>'}</div>`
      : '';
    $('detailBody').innerHTML = gal + `<div class="pad">
      <div class="row1" style="margin-bottom:8px;"><span class="score" style="background:${scoreColor(r.total_score)}">${r.total_score != null ? Math.round(r.total_score) : '—'}</span>
        <b style="font-size:15px; flex:1; min-width:0;">${r.title || 'Listing ' + r.id}</b>${heart}</div>
      ${expert}${ppm}${facts}${mapHtml}${why}${r.has_al_license ? al : inv}${sim}${chat}${alAdmin}${watch}${open}</div>`;
    initMap(r);
    initChat(r.id);
    simInit(iv, r);
  }

  function initMap(r) {
    if (!window.L || r.latitude == null || r.longitude == null) return;
    const el = document.getElementById('omap');
    if (!el) return;
    const m = L.map(el, { attributionControl: false, scrollWheelZoom: false })
              .setView([r.latitude, r.longitude], r.exact_location ? 16 : 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(m);
    if (r.exact_location)
      L.circleMarker([r.latitude, r.longitude], { radius: 8, color: '#fff', weight: 2, fillColor: '#4f8cff', fillOpacity: 1 }).addTo(m);
    else
      L.circle([r.latitude, r.longitude], { radius: 450, color: '#4f8cff', weight: 1, fillColor: '#4f8cff', fillOpacity: 0.18 }).addTo(m);
    setTimeout(() => m.invalidateSize(), 80);
    setTimeout(() => m.invalidateSize(), 400);
  }

  async function setWatch(id, status) {
    const note = $('wnote') ? $('wnote').value : '';
    await fetch(`/app/api/property/${id}/watch?status=${encodeURIComponent(status)}&note=${encodeURIComponent(note)}`,
      { method: 'POST', headers: authHeaders() });
    tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light');
    openDetail(id);
  }
  function saveNote(id) { setWatch(id, state._cur || ''); }
  function toggleHeart(id) { setWatch(id, state._cur === 'interested' ? '' : 'interested'); }

  // ---- filters ----
  function readFilters() {
    const f = {};
    const v = (id) => $(id).value.trim();
    if (v('f_min_score')) f.min_score = v('f_min_score');
    if (v('f_max_price')) f.max_price = v('f_max_price');
    if (v('f_typology')) f.typology = v('f_typology');
    if (v('f_municipality')) f.municipality = v('f_municipality');
    if (v('f_max_dist')) f.max_distance_to_metro = v('f_max_dist');
    if (v('f_min_yield')) f.min_gross_yield = v('f_min_yield');
    TOGGLES.forEach(([k]) => { if ($('t_' + k).checked) f[k] = 'true'; });
    state.sort = $('f_sort').value;
    state.filters = f;
  }
  function resetFilters() {
    ['f_min_score','f_max_price','f_max_dist','f_min_yield'].forEach(id => $(id).value = '');
    $('f_typology').value = ''; $('f_municipality').value = ''; $('f_sort').value = 'score_desc';
    TOGGLES.forEach(([k]) => $('t_' + k).checked = false);
    state.filters = {}; state.sort = null;
  }

  // ---- saved searches (subscriptions) ----
  async function apiSend(path, method, body) {
    const r = await fetch(path, {
      method,
      headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: body ? JSON.stringify(body) : undefined,
    });
    return r.json().catch(() => ({}));
  }
  async function saveCurrentFilter() {
    readFilters();
    const res = await apiSend('/app/api/filters', 'POST', { criteria: state.filters });
    if (res && res.id) {
      tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
      loadSavedFilters();
    } else {
      const msg = (res && res.detail) || 'Не удалось сохранить';
      tg.showPopup ? tg.showPopup({ message: msg }) : alert(msg);
    }
  }
  async function loadSavedFilters() {
    const el = $('savedList'); if (!el) return;
    let data; try { data = await api('/app/api/filters'); } catch (e) { return; }
    const rows = (data && data.rows) || [];
    if (!rows.length) {
      el.innerHTML = '<div style="color:#8b93a7; font-size:13px; line-height:1.5;">Нет подписок. Настрой фильтр и нажми «Сохранить как подписку» — будем присылать новые подходящие объекты в Telegram.</div>';
      return;
    }
    el.innerHTML = '<div style="font-size:13px; color:#8b93a7; margin-bottom:6px;">Мои подписки (' + rows.length + '/' + (data.max || 10) + '):</div>' +
      rows.map(s => `
        <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); border-radius:10px; padding:8px 10px; margin-bottom:6px;">
          <span onclick='applySavedFilter(${JSON.stringify(s.criteria)})' style="flex:1; font-size:13px; ${s.active ? '' : 'opacity:.5;'} cursor:pointer;">${s.active ? '🔔' : '🔕'} ${(s.name || 'поиск').replace(/</g, '&lt;')}</span>
          <button class="ghost" style="padding:4px 9px; font-size:12px;" onclick="toggleSavedFilter(${s.id}, ${s.active ? 'false' : 'true'})">${s.active ? 'выкл' : 'вкл'}</button>
          <button class="ghost" style="padding:4px 9px; font-size:12px;" onclick="deleteSavedFilter(${s.id})">🗑</button>
        </div>`).join('');
  }
  async function deleteSavedFilter(id) { await apiSend('/app/api/filters/' + id, 'DELETE'); loadSavedFilters(); }
  async function toggleSavedFilter(id, active) { await apiSend('/app/api/filters/' + id + '/toggle?active=' + active, 'POST'); loadSavedFilters(); }
  async function setAl(id, value) { await apiSend('/app/api/property/' + id + '/al_override?value=' + value, 'POST'); openDetail(id); }

  // ---- areas (where to buy) ----
  async function loadAreas() {
    const el = $('areasList'); el.innerHTML = '<div class="empty">Загрузка…</div>';
    let data; try { data = await api('/app/api/areas'); } catch (e) { el.innerHTML = '<div class="empty">Доступ закрыт.</div>'; return; }
    const rows = (data && data.rows) || [];
    if (!rows.length) { el.innerHTML = '<div class="empty">Недостаточно данных.</div>'; return; }
    el.innerHTML = rows.map((a, i) => `
      <div class="panel" style="margin:8px 0; cursor:pointer;" onclick="openArea(this.dataset.m)" data-m="${(a.municipality || '').replace(/"/g, '')}">
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="score" style="background:${scoreColor(a.score)}">${a.score != null ? a.score : '—'}</span>
          <b style="flex:1; min-width:0;">${i + 1}. ${a.zone}</b>
          <span class="meta">${a.count} об.</span>
        </div>
        <div class="facts" style="margin-top:6px;">${a.median_ppm2 ? fmt(a.median_ppm2) + ' €/m²' : '—'} · доход. ${a.median_yield != null ? f1(a.median_yield) + '%' : '—'} · 🚇 ${a.median_metro_min != null ? a.median_metro_min + ' мин' : '—'}${a.al_count ? ' · 🏷 ' + a.al_count + ' AL' : ''}</div>
        <div style="margin-top:6px;">${a.tags.map(t => `<span class="badge" style="background:#26314a; color:#aac4ff; margin-right:4px;">${t}</span>`).join('')}</div>

  function openArea(muni) {
    $('areasSheet').classList.remove('open');
    resetFilters();
    if (muni && $('f_municipality')) $('f_municipality').value = muni;
    readFilters();

  // ---- per-listing AI chat ----
  let chatLog = [];
  const CHAT_QS = ['Стоит торговаться?', 'Кому сдавать?', 'Главные риски?', 'Сравнить с районом'];
  function renderChat() {
    const box = $('chatBox'); if (!box) return;
    box.innerHTML = chatLog.map(m => `<div style="align-self:${m.role === 'user' ? 'flex-end' : 'flex-start'}; max-width:88%; background:${m.role === 'user' ? '#1d3a2a' : 'rgba(255,255,255,.06)'}; color:#e6e8ee; padding:7px 11px; border-radius:13px; font-size:13.5px; line-height:1.45; white-space:pre-wrap;">${m.content.replace(/</g, '&lt;')}</div>`).join('');
    box.scrollTop = box.scrollHeight;
  }
  async function sendChat(id, preset) {
    const inp = $('chatInput');
    const text = (preset || (inp && inp.value) || '').trim();
    if (!text) return;
    if (inp) inp.value = '';
    chatLog.push({ role: 'user', content: text });
    const typing = { role: 'assistant', content: '…' };
    chatLog.push(typing); renderChat();
    let res = null;
    try { res = await apiSend('/app/api/property/' + id + '/chat', 'POST', { messages: chatLog.filter(m => m !== typing) }); } catch (e) {}
    chatLog.pop();
    chatLog.push({ role: 'assistant', content: (res && res.answer) || 'Не удалось ответить, попробуйте ещё раз.' });
    renderChat();
  }
  function initChat(id) {
    const chips = $('chatChips');
    if (chips) chips.innerHTML = CHAT_QS.map(q => `<button class="chip" data-q="${q}" onclick="sendChat(${id}, this.dataset.q)">${q}</button>`).join('');
    const inp = $('chatInput');
    if (inp) inp.onkeydown = e => { if (e.key === 'Enter') sendChat(id); };
    renderChat();
  }

  // ---- ROI simulator ----
  let SIM = {};
  function simHtml(iv, r) {
    if (!iv) return '';
    const al = r.has_al_license && iv.al;
    const income = Math.round(al ? iv.al.monthly_gross : (iv.income.rent_mid || 0));
    const sl = (id, min, max, step, val, lab) => `<div class="sim-row"><div class="lab"><span>${lab}</span><b id="${id}_v"></b></div><input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" oninput="simCalc()"></div>`;
    return `<div class="panel"><h3>📈 ROI-симулятор${al ? ' · краткосрочная (AL)' : ''}</h3>
      <div class="sim-kpis">
        <div class="sim-kpi hero"><div class="k">Доходность на вложенный кэш</div><div class="v" id="sim_irr">—</div></div>
        <div class="sim-kpi"><div class="k">Кэшфлоу / мес</div><div class="v" id="sim_cf">—</div></div>
        <div class="sim-kpi"><div class="k">Cash-on-cash</div><div class="v" id="sim_coc">—</div></div>
        <div class="sim-kpi"><div class="k">Капитал через <span id="sim_yl"></span> лет</div><div class="v" id="sim_eq">—</div></div>
        <div class="sim-kpi"><div class="k">Общая прибыль</div><div class="v" id="sim_profit">—</div></div>
      </div>
      <svg class="sim-chart" id="sim_chart" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
      ${sl('sim_neg', -20, 0, 1, 0, 'Торг к цене')}
      ${sl('sim_income', 0, Math.max(100, income * 2), 10, income, 'Доход / мес')}
      ${sl('sim_ltv', 0, 90, 5, Math.round(iv.mortgage.ltv_pct), 'Кредит (LTV)')}
      ${sl('sim_rate', 1, 7, 0.1, iv.mortgage.rate_pct, 'Ставка по кредиту')}
      ${sl('sim_appr', 0, 8, 0.5, 3, 'Рост цены / год')}
      ${sl('sim_years', 1, 30, 1, 10, 'Горизонт')}
      <div class="meta" style="margin-top:8px;">Оценка по допущениям; не финсовет. Налоги и издержки на продажу не учтены.</div></div>`;
  }
  function simInit(iv, r) {
    if (!iv) return;
    const al = r.has_al_license && iv.al;
    SIM = {
      price: iv.price,
      accRate: (iv.acquisition.total_investment - iv.price) / iv.price,
      imiRate: (iv.income.imi || 0) / iv.price,
      opexPct: al ? iv.al.opex_pct : 20,
      term: iv.mortgage.term_years || 30,
    };
    simCalc();
  }
  function simCalc() {
    if (!SIM.price) return;
    const val = id => parseFloat(($(id) || {}).value || 0);
    const neg = val('sim_neg'), income = val('sim_income'), ltv = val('sim_ltv'),
          rate = val('sim_rate'), appr = val('sim_appr'), years = Math.round(val('sim_years'));
    $('sim_neg_v').textContent = neg + '%';
    $('sim_income_v').textContent = eur(income);
    $('sim_ltv_v').textContent = ltv + '%';
    $('sim_rate_v').textContent = rate.toFixed(1) + '%';
    $('sim_appr_v').textContent = appr.toFixed(1) + '%';
    $('sim_years_v').textContent = years + ' лет';
    $('sim_yl').textContent = years;
    const price = SIM.price * (1 + neg / 100);
    const costs = price * SIM.accRate;
    const loan = price * ltv / 100, down = price - loan, cashIn = down + costs;
    const r = rate / 1200, n = SIM.term * 12;
    const mPay = r > 0 ? loan * r / (1 - Math.pow(1 + r, -n)) : loan / n;
    const annualCF = income * 12 - (income * 12 * SIM.opexPct / 100 + price * SIM.imiRate) - mPay * 12;
    const pts = [];
    for (let y = 1; y <= years; y++) {
      const value = price * Math.pow(1 + appr / 100, y);
      const bal = r > 0 ? loan * (Math.pow(1 + r, n) - Math.pow(1 + r, y * 12)) / (Math.pow(1 + r, n) - 1) : loan * (1 - y * 12 / n);
      pts.push({ y, total: (value - Math.max(0, bal)) + annualCF * y });
    }
    const last = pts[pts.length - 1] || { total: cashIn };
    const profit = last.total - cashIn;
    const coc = cashIn > 0 ? annualCF / cashIn * 100 : 0;
    const ann = (cashIn > 0 && last.total > 0) ? (Math.pow(last.total / cashIn, 1 / Math.max(1, years)) - 1) * 100 : 0;
    const cfm = Math.round(annualCF / 12);
    $('sim_cf').textContent = (cfm >= 0 ? '' : '') + eur(cfm); $('sim_cf').style.color = cfm >= 0 ? '#8fe3ab' : '#ffb4ac';
    $('sim_coc').textContent = coc.toFixed(1) + '%';
    $('sim_eq').textContent = eur(Math.round(last.total));
    $('sim_profit').textContent = (profit >= 0 ? '+' : '') + eur(Math.round(profit)); $('sim_profit').style.color = profit >= 0 ? '#8fe3ab' : '#ffb4ac';
    $('sim_irr').textContent = ann.toFixed(1) + '% годовых'; $('sim_irr').style.color = ann >= 0 ? '#8fe3ab' : '#ffb4ac';
    drawSimChart(pts, cashIn);
  }
  function drawSimChart(pts, cashIn) {
    const svg = $('sim_chart'); if (!svg || !pts.length) return;
    const W = 320, H = 150, pad = 4;
    const max = Math.max(cashIn, ...pts.map(p => p.total), 1) * 1.1;
    const bw = (W - pad * 2) / pts.length;
    const by = H - (cashIn / max) * (H - 10) - 4;
    let s = `<defs><linearGradient id="simg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5be38f"/><stop offset="1" stop-color="#2f8f5a"/></linearGradient></defs>`;
    s += `<line x1="0" y1="${by.toFixed(1)}" x2="${W}" y2="${by.toFixed(1)}" stroke="#ffffff44" stroke-dasharray="4 3" stroke-width="1"/>`;
    pts.forEach((p, i) => {
      const h = Math.max(1, (p.total / max) * (H - 10));
      s += `<rect x="${(pad + i * bw + 1).toFixed(1)}" y="${(H - h - 4).toFixed(1)}" width="${(bw - 2).toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${p.total >= cashIn ? 'url(#simg)' : '#5a6173'}"/>`;
    });
    svg.innerHTML = s;
  }
  function applySavedFilter(c) {
    c = c || {};
    resetFilters();
    if (c.min_score != null) $('f_min_score').value = c.min_score;
    if (c.max_price != null) $('f_max_price').value = c.max_price;
    if (c.typology) $('f_typology').value = c.typology;
    if (c.municipality) $('f_municipality').value = c.municipality;
    if (c.max_distance_to_metro != null) $('f_max_dist').value = c.max_distance_to_metro;
    if (c.min_gross_yield != null) $('f_min_yield').value = c.min_gross_yield;
    TOGGLES.forEach(([k]) => { if (c[k]) $('t_' + k).checked = true; });
    readFilters();
    $('filterSheet').classList.remove('open');
    loadList(true);
  }
  function pendingDetailId() {
    const q = new URLSearchParams(location.search).get('p');
    if (q && /^\d+$/.test(q)) return parseInt(q);
    const sp = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
    const m = sp.match(/^p(\d+)$/);
    return m ? parseInt(m[1]) : null;
  }

  function buildUI() {
    $('tabs').innerHTML = TABS.map(t => `<button class="cat ${t.id === 'top' ? 'active' : ''}" data-id="${t.id}" style="background-image:url(/static/icons/${t.icon}.png)"><span>${t.label}</span></button>`).join('');
    document.querySelectorAll('.cat').forEach(b => b.onclick = () => {
      document.querySelectorAll('.cat').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); state.tab = b.dataset.id; state.watchStatus = ''; loadList(true);
    });
    $('toggles').innerHTML = TOGGLES.map(([k, label]) =>
      `<label class="toggle"><input type="checkbox" id="t_${k}">${label}</label>`).join('');
    $('filterBtn').onclick = () => { $('filterSheet').classList.add('open'); loadSavedFilters(); };
    $('areasBtn').onclick = () => { $('areasSheet').classList.add('open'); loadAreas(); };
    $('areasClose').onclick = () => $('areasSheet').classList.remove('open');
    $('filterSave').onclick = saveCurrentFilter;
    $('filterClose').onclick = () => $('filterSheet').classList.remove('open');
    $('filterApply').onclick = () => { readFilters(); $('filterSheet').classList.remove('open'); loadList(true); };
    $('filterReset').onclick = () => { resetFilters(); $('filterSheet').classList.remove('open'); loadList(true); };
    $('more').onclick = () => { state.offset += state.limit; loadList(false); };
    $('detailClose').onclick = closeDetail;
    $('subscribeBtn').onclick = subscribe;
    tg.BackButton.onClick(closeDetail);
  }

  function showPaywall() {
    $('topbar').style.display = 'none'; $('paywall').classList.add('open');
    $('paywallText').textContent = `${ME.price_stars} ⭐ за ${ME.period_days} дней доступа ко всей аналитике.`;
  }

  async function subscribe() {
    if (ME.subscribe_url) {  // Tribute (cards / Wallet Pay)
      if (ME.subscribe_url.indexOf('https://t.me') === 0) tg.openTelegramLink(ME.subscribe_url);
      else tg.openLink(ME.subscribe_url);
      pollAccess();
      return;
    }
    // fallback: Telegram Stars invoice
    $('paywallStatus').textContent = 'Создаю счёт…';
    let r;
    try { r = await fetch('/app/api/subscribe', { method: 'POST', headers: authHeaders() }); }
    catch (e) { $('paywallStatus').textContent = 'Ошибка сети'; return; }
    const d = await r.json();
    if (!d.link) { $('paywallStatus').textContent = 'Оплата сейчас недоступна'; return; }
    tg.openInvoice(d.link, (status) => {
      if (status === 'paid') pollAccess();
      else if (status === 'failed') $('paywallStatus').textContent = 'Оплата не прошла.';
    });
  }

  async function pollAccess() {
    $('paywallStatus').textContent = 'После оплаты вернись — доступ откроется автоматически…';
    for (let i = 0; i < 12; i++) {
      await new Promise(res => setTimeout(res, 2500));
      try { ME = await api('/app/api/me'); } catch (e) {}
      if (ME.active && !ME.trial) { startApp(); return; }
    }
    $('paywallStatus').textContent = 'Если оплата прошла — перезапусти приложение.';
  }

  async function startApp() {
    $('paywall').classList.remove('open'); $('topbar').style.display = '';
    $('trialBanner').innerHTML = ME.trial
      ? `<div style="margin:0 10px 6px; background:#16243a; color:#9cc2ff; border-radius:9px; padding:8px 11px; font-size:13px; display:flex; justify-content:space-between; align-items:center; gap:8px;">
           🎁 Пробный доступ${ME.until ? ' до ' + new Date(ME.until).toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : ''}
           <button class="ghost" style="background:var(--btn); color:var(--btn-text);" onclick="subscribe()">Подписаться</button></div>`
      : '';
    try {
      META = await api('/app/api/meta');
      wmap = {}; META.watch_statuses.forEach(s => wmap[s.value] = s);
      $('f_typology').innerHTML = '<option value="">Любая</option>' + META.typologies.map(t => `<option>${t}</option>`).join('');
      $('f_municipality').innerHTML = '<option value="">Любой</option>' + META.municipalities.map(m => `<option>${m}</option>`).join('');
    } catch (e) {}
    loadList(true);
    const pid = pendingDetailId();
    if (pid) setTimeout(() => openDetail(pid), 350);
  }

  async function init() {
    buildUI();
    try { ME = await api('/app/api/me'); }
    catch (e) {
      $('meta').textContent = '';
      $('list').innerHTML = '<div class="empty">Откройте приложение внутри Telegram.</div>';
      return;
    }
    if (ME.active) startApp(); else showPaywall();
  }
  init();
  </script>
</body>
