<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ app_name }}</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f1115);
      --sec: var(--tg-theme-secondary-bg-color, #1a1d24);
      --text: var(--tg-theme-text-color, #e6e9ef);
      --hint: var(--tg-theme-hint-color, #8a93a2);
      --link: var(--tg-theme-link-color, #4f8cff);
      --btn: var(--tg-theme-button-color, #4f8cff);
      --btn-text: var(--tg-theme-button-text-color, #fff);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text);
           font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tabs { display: flex; gap: 6px; padding: 10px; position: sticky; top: 0; background: var(--bg); }
    .tab { flex: 1; padding: 9px; border: none; border-radius: 9px; background: var(--sec);
           color: var(--text); font-size: 13px; }
    .tab.active { background: var(--btn); color: var(--btn-text); }
    .meta { color: var(--hint); font-size: 12px; padding: 0 12px 8px; }
    .card { display: flex; gap: 10px; background: var(--sec); border-radius: 12px;
            margin: 8px 10px; padding: 10px; }
    .card img { width: 96px; height: 72px; object-fit: cover; border-radius: 8px; background: #11141a; flex: none; }
    .card .body { min-width: 0; flex: 1; }
    .row1 { display: flex; align-items: center; gap: 8px; }
    .score { font-weight: 700; padding: 1px 8px; border-radius: 20px; color: #07140c; font-size: 13px; }
    .title { font-size: 13px; margin: 3px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .facts { color: var(--hint); font-size: 12px; }
    .price { font-weight: 600; }
    a { color: var(--link); text-decoration: none; }
    .empty { text-align: center; color: var(--hint); padding: 40px 16px; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-q="sort=score_desc&min_score=60">🔥 Топ</button>
    <button class="tab" data-q="only_new=true&sort=newest">🆕 Новинки</button>
    <button class="tab" data-q="only_price_drops=true&sort=biggest_drop">🔻 Снижения</button>
  </div>
  <div class="meta" id="meta">Загрузка…</div>
  <div id="list"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();
    const fmt = n => n == null ? '—' : Math.round(n).toLocaleString('pt-PT');
    const scoreColor = s => s == null ? '#444' : s >= 70 ? '#2fbf71' : s >= 55 ? '#9acd32' : s >= 40 ? '#f5a623' : '#e5534b';

    async function load(query) {
      document.getElementById('meta').textContent = 'Загрузка…';
      let r;
      try {
        r = await fetch('/app/api/properties?limit=50&' + query,
                        { headers: { 'X-Telegram-Init-Data': tg.initData } });
      } catch (e) { document.getElementById('meta').textContent = 'Ошибка сети'; return; }
      if (r.status === 401 || r.status === 403) {
        document.getElementById('meta').textContent = '';
        document.getElementById('list').innerHTML = '<div class="empty">Доступ только для владельца приложения.</div>';
        return;
      }
      const data = await r.json();
      render(data);
    }

    function render(items) {
      document.getElementById('meta').textContent = items.length + ' объектов';
      const list = document.getElementById('list');
      if (!items.length) { list.innerHTML = '<div class="empty">Ничего не найдено.</div>'; return; }
      list.innerHTML = items.map(r => {
        const img = r.thumbnail_url ? `<img src="${r.thumbnail_url}" alt="">` : '<img alt="">';
        const yld = r.gross_yield_percent != null ? r.gross_yield_percent.toFixed(1) + '%' : '—';
        const dist = r.distance_to_metro_m != null ? Math.round(r.distance_to_metro_m) + ' м' : '—';
        const drop = r.price_drop_percent ? ` · 🔻${r.price_drop_percent.toFixed(1)}%` : '';
        return `<div class="card">${img}<div class="body">
          <div class="row1"><span class="score" style="background:${scoreColor(r.total_score)}">${r.total_score != null ? Math.round(r.total_score) : '—'}</span>
            <span class="price">${fmt(r.price)} €</span> · ${r.typology || ''} · ${fmt(r.price_per_m2)} €/м²</div>
          <div class="title">${(r.title || 'Listing ' + r.id)}</div>
          <div class="facts">${r.municipality || ''}${r.parish ? ' / ' + r.parish : ''}<br>
            🚇 ${r.nearest_metro_station || '—'} · ${dist} · доходность ${yld}${drop}</div>
          ${r.url ? `<a href="#" onclick="tg.openLink('${r.url}');return false;">Открыть на Idealista →</a>` : ''}
        </div></div>`;
      }).join('');
    }

    document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      load(b.dataset.q);
    }));
    load('sort=score_desc&min_score=60');
  </script>
</body>
</html>
