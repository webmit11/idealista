{% extends "base.html" %}
{% block title %}Map — {{ app_name }}{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="meta">{{ listings|length }} listings · markers coloured by score · blue dots = metro stations</div>
<div id="map"></div>

<script>
  const listings = {{ listings|tojson }};
  const stations = {{ stations|tojson }};

  const map = L.map('map').setView([41.16, -8.62], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  function scoreColor(s) {
    if (s == null) return '#888';
    if (s >= 70) return '#2fbf71';
    if (s >= 55) return '#9acd32';
    if (s >= 40) return '#f5a623';
    return '#e5534b';
  }

  stations.forEach(st => {
    L.circleMarker([st.lat, st.lng], {radius: 4, color: '#4f8cff', weight: 1, fillColor: '#4f8cff', fillOpacity: 0.9})
      .addTo(map).bindTooltip('Ⓜ ' + st.name);
  });

  const bounds = [];
  listings.forEach(p => {
    if (p.lat == null || p.lng == null) return;
    bounds.push([p.lat, p.lng]);
    const m = L.circleMarker([p.lat, p.lng], {
      radius: 6, color: '#111', weight: 1, fillColor: scoreColor(p.score), fillOpacity: 0.95
    }).addTo(map);
    const img = p.thumb ? `<img src="${p.thumb}">` : '';
    const price = p.price ? Math.round(p.price).toLocaleString('pt-PT') + ' €' : '—';
    const yld = (p.yield != null) ? p.yield.toFixed(1) + '%' : '—';
    m.bindPopup(
      `${img}<b>${p.score != null ? Math.round(p.score) : '—'}</b> · ${p.typology || ''} · ${price}<br>` +
      `${p.title || ''}<br>${p.metro || ''} · yield ${yld}<br>` +
      `<a href="/property/${p.id}">details</a>` +
      (p.url ? ` · <a href="${p.url}" target="_blank" rel="noopener">idealista</a>` : '')
    );
  });
  if (bounds.length) map.fitBounds(bounds, {padding: [30, 30]});
</script>
{% endblock %}
